name: Build GARbro-Mod (.NET Framework)

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        configuration: [Debug, Release]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Restore NuGet packages
      run: nuget restore GARbro.sln

    - name: Build Solution
      run: msbuild GARbro.sln /p:Configuration=${{ matrix.configuration }} /p:Platform="Any CPU"

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: GARbro-${{ matrix.configuration }}
        path: |
          GARbro.GUI\bin\${{ matrix.configuration }}\name: Build GARbro-Mod (.NET Framework)

