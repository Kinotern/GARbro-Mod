name: Build GARbro-Mod (x64 Only)

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        configuration: [Debug, Release]

    steps:
    - uses: actions/checkout@v4

    - uses: microsoft/setup-msbuild@v2

    - uses: NuGet/setup-nuget@v2

    - name: Restore
      run: nuget restore GARbro.sln

    - name: Build
      run: msbuild GARbro.sln /p:Configuration=${{ matrix.configuration }} /p:Platform="x64"

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: GARbro-${{ matrix.configuration }}-x64
        path: GARbro.GUI\bin\x64\${{ matrix.configuration }}\
