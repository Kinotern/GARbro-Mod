name: Build GARbro-Mod (.NET Framework)

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # 安装 MSBuild
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    # 恢复 NuGet 包
    - name: Restore NuGet packages
      run: nuget restore GARbro.sln

    # 编译 Release 版本
    - name: Build Solution
      run: msbuild GARbro.sln /p:Configuration=Release /p:Platform="Any CPU"

    # 上传构建产物
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: GARbro-Build
        path: |
          GARbro.GUI\bin\Release\
